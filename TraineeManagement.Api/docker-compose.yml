services:
  redis:
    # image:  redis:7.0.11-alpine
    image: docker-registry-002.zeuslearning.com/zeuslearning/redis
    container_name: redis_server
    ports:
      - "6379:6379"
    command: ["redis-server","--appendonly","yes"]
    volumes:
      - redis_data:/data

  mysql:
    # image: mysql:8.0
    image: docker-registry-002.zeuslearning.com/zeuslearning/mysql
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "trainee_management_db"
    ports:
      # - "3306:3306"
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  
  rabbitmq:
    # image: rabbitmq:3.12.0-management-alpine
    image: docker-registry-002.zeuslearning.com/zeuslearning/rabbitmq:3-management
    container_name: dotnetrabbitmq
    restart: always
    ports:
      - "5672:5672"  
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: mqhost
    volumes:
      - dotnetrabbitmq:/var/lib/rabbitmq
    
volumes:
  redis_data:
  mysql_data:
  dotnetrabbitmq: 
